<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password – CognitoSphere AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}" />
</head>
<body>

  <div id="toastContainer" class="toast-container"></div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    <div id="flashData" style="display:none">
      {% for category, message in messages %}
        <span data-cat="{{ category }}">{{ message }}</span>
      {% endfor %}
    </div>
  {% endwith %}

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-icon">🔑</div>
        <h1>CognitoSphere AI</h1>
        <p>Reset your password</p>
      </div>

      <p class="otp-hint">Enter your registered email and we'll send you a 6-digit OTP.</p>

      <form id="forgotForm" method="POST" action="{{ url_for('forgot_password') }}" class="auth-form" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="form-group" id="grp-email">
          <label for="email">Email Address</label>
          <div class="input-icon-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" name="email" placeholder="Enter your registered email" autocomplete="email"/>
          </div>
          <span class="field-error" id="err-email"></span>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">Send OTP</button>
      </form>

      <p class="auth-footer">
        Remember your password? <a href="{{ url_for('login') }}">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    function showToast(message, type = 'error') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span class="toast-icon">${type === 'success' ? '✓' : type === 'info' ? 'ℹ' : '✕'}</span>
        <span class="toast-msg">${message}</span>
        <button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 5000);
    }

    document.querySelectorAll('#flashData span').forEach(el => {
      showToast(el.textContent.trim(), el.dataset.cat);
    });

    function setError(id, msg) {
      document.getElementById('grp-' + id).classList.add('has-error');
      document.getElementById('err-' + id).textContent = msg;
      document.getElementById(id).classList.add('input-error');
    }
    function setSuccess(id) {
      document.getElementById('grp-' + id).classList.remove('has-error');
      document.getElementById('grp-' + id).classList.add('has-success');
      document.getElementById('err-' + id).textContent = '';
      document.getElementById(id).classList.remove('input-error');
      document.getElementById(id).classList.add('input-success');
    }

    function validateEmail() {
      const val = document.getElementById('email').value.trim();
      if (!val) { setError('email', 'Email is required.'); return false; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { setError('email', 'Enter a valid email address.'); return false; }
      setSuccess('email'); return true;
    }

    document.getElementById('email').addEventListener('blur', validateEmail);
    document.getElementById('email').addEventListener('input', () => {
      if (document.getElementById('email').classList.contains('input-error')) validateEmail();
    });

    document.getElementById('forgotForm').addEventListener('submit', function(e) {
      if (!validateEmail()) {
        e.preventDefault();
        showToast('Please enter a valid email address.', 'error');
      } else {
        document.getElementById('submitBtn').textContent = 'Sending…';
        document.getElementById('submitBtn').disabled = true;
      }
    });
  </script>
</body>
</html>
