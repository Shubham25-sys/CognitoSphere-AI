<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – CognitoSphere AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}" />
</head>
<body>

  <div id="toastContainer" class="toast-container"></div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    <div id="flashData" style="display:none">
      {% for category, message in messages %}
        <span data-cat="{{ category }}">{{ message }}</span>
      {% endfor %}
    </div>
  {% endwith %}

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-icon">🔒</div>
        <h1>CognitoSphere AI</h1>
        <p>Create a new password</p>
      </div>

      <form id="resetForm" method="POST" action="{{ url_for('reset_password_page') }}" class="auth-form" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <!-- New Password -->
        <div class="form-group" id="grp-password">
          <label for="password">New Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="password" name="password"
                   placeholder="Create a strong password" autocomplete="new-password"/>
            <button type="button" class="toggle-pass" onclick="togglePassword('password', this)">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-label" id="strengthLabel"></span>
          <span class="field-error" id="err-password"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group" id="grp-confirm_password">
          <label for="confirm_password">Confirm Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="Repeat your password" autocomplete="new-password"/>
            <button type="button" class="toggle-pass" onclick="togglePassword('confirm_password', this)">👁</button>
          </div>
          <span class="field-error" id="err-confirm_password"></span>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">Reset Password</button>
      </form>

      <p class="auth-footer">
        <a href="{{ url_for('login') }}">Back to login</a>
      </p>
    </div>
  </div>

  <script>
    function showToast(message, type = 'error') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span class="toast-icon">${type === 'success' ? '✓' : type === 'info' ? 'ℹ' : '✕'}</span>
        <span class="toast-msg">${message}</span>
        <button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 5000);
    }

    document.querySelectorAll('#flashData span').forEach(el => {
      showToast(el.textContent.trim(), el.dataset.cat);
    });

    function setError(id, msg) {
      document.getElementById('grp-' + id).classList.add('has-error');
      document.getElementById('grp-' + id).classList.remove('has-success');
      document.getElementById('err-' + id).textContent = msg;
      document.getElementById(id).classList.add('input-error');
      document.getElementById(id).classList.remove('input-success');
    }
    function setSuccess(id) {
      document.getElementById('grp-' + id).classList.remove('has-error');
      document.getElementById('grp-' + id).classList.add('has-success');
      document.getElementById('err-' + id).textContent = '';
      document.getElementById(id).classList.remove('input-error');
      document.getElementById(id).classList.add('input-success');
    }

    // ── Password strength meter ───────────────────────────
    function checkStrength(pw) {
      let score = 0;
      if (pw.length >= 8)          score++;
      if (/[A-Z]/.test(pw))        score++;
      if (/[0-9]/.test(pw))        score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      return score;
    }

    document.getElementById('password').addEventListener('input', function() {
      const pw    = this.value;
      const score = checkStrength(pw);
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      const levels = ['', 'strength-weak', 'strength-fair', 'strength-good', 'strength-strong'];
      const names  = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      fill.className  = 'strength-fill ' + (levels[score] || '');
      fill.style.width = (score * 25) + '%';
      label.className  = 'strength-label ' + (levels[score] || '');
      label.textContent = pw ? names[score] : '';
    });

    // ── Validators ────────────────────────────────────────
    function validatePassword() {
      const pw = document.getElementById('password').value;
      if (!pw) { setError('password', 'Password is required.'); return false; }
      if (pw.length < 8) { setError('password', 'At least 8 characters required.'); return false; }
      if (!/[A-Z]/.test(pw)) { setError('password', 'Must contain an uppercase letter.'); return false; }
      if (!/[0-9]/.test(pw)) { setError('password', 'Must contain a number.'); return false; }
      setSuccess('password'); return true;
    }

    function validateConfirm() {
      const pw  = document.getElementById('password').value;
      const cnf = document.getElementById('confirm_password').value;
      if (!cnf) { setError('confirm_password', 'Please confirm your password.'); return false; }
      if (pw !== cnf) { setError('confirm_password', 'Passwords do not match.'); return false; }
      setSuccess('confirm_password'); return true;
    }

    document.getElementById('password').addEventListener('blur', validatePassword);
    document.getElementById('confirm_password').addEventListener('blur', validateConfirm);

    document.getElementById('resetForm').addEventListener('submit', function(e) {
      const ok = [validatePassword(), validateConfirm()].every(Boolean);
      if (!ok) {
        e.preventDefault();
        showToast('Please fix the errors before submitting.', 'error');
      } else {
        document.getElementById('submitBtn').textContent = 'Resetting…';
        document.getElementById('submitBtn').disabled = true;
      }
    });

    function togglePassword(fieldId, btn) {
      const field = document.getElementById(fieldId);
      field.type = field.type === 'password' ? 'text' : 'password';
      btn.textContent = field.type === 'password' ? '👁' : '🙈';
    }
  </script>
</body>
</html>
