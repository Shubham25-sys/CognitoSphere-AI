<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Outer glow sphere gradient -->
    <radialGradient id="sphereGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#388bfd" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d419d" stop-opacity="1"/>
    </radialGradient>

    <!-- Inner core gradient -->
    <radialGradient id="coreGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#a5d6ff"/>
      <stop offset="100%" stop-color="#388bfd"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0d419d" flood-opacity="0.5"/>
    </filter>

    <!-- Node glow -->
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Outer ring ── -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#388bfd" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="100" cy="100" r="82" fill="none" stroke="#58a6ff" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- ── Main sphere ── -->
  <circle cx="100" cy="100" r="72" fill="url(#sphereGrad)" filter="url(#shadow)"/>

  <!-- Sphere highlight -->
  <ellipse cx="82" cy="74" rx="22" ry="14" fill="white" fill-opacity="0.12"/>

  <!-- ── Latitude / longitude lines (globe feel) ── -->
  <ellipse cx="100" cy="100" rx="72" ry="28" fill="none" stroke="#a5d6ff" stroke-width="0.8" stroke-opacity="0.25"/>
  <ellipse cx="100" cy="100" rx="52" ry="68" fill="none" stroke="#a5d6ff" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="100" y1="28" x2="100" y2="172" stroke="#a5d6ff" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="28"  y1="100" x2="172" y2="100" stroke="#a5d6ff" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- ── Neural network nodes (6 nodes) ── -->
  <!-- Center node -->
  <circle cx="100" cy="100" r="7" fill="url(#coreGrad)" filter="url(#nodeGlow)"/>

  <!-- Top node -->
  <circle cx="100" cy="58"  r="5" fill="#a5d6ff" filter="url(#nodeGlow)"/>
  <!-- Bottom node -->
  <circle cx="100" cy="142" r="5" fill="#a5d6ff" filter="url(#nodeGlow)"/>
  <!-- Left node -->
  <circle cx="62"  cy="100" r="5" fill="#a5d6ff" filter="url(#nodeGlow)"/>
  <!-- Right node -->
  <circle cx="138" cy="100" r="5" fill="#a5d6ff" filter="url(#nodeGlow)"/>
  <!-- Top-right node -->
  <circle cx="130" cy="68"  r="4" fill="#cae8ff" filter="url(#nodeGlow)"/>
  <!-- Bottom-left node -->
  <circle cx="70"  cy="132" r="4" fill="#cae8ff" filter="url(#nodeGlow)"/>

  <!-- ── Neural connections ── -->
  <g stroke="#a5d6ff" stroke-opacity="0.55" stroke-width="1.2" filter="url(#glow)">
    <!-- Center ↔ all primaries -->
    <line x1="100" y1="100" x2="100" y2="58"/>
    <line x1="100" y1="100" x2="100" y2="142"/>
    <line x1="100" y1="100" x2="62"  y2="100"/>
    <line x1="100" y1="100" x2="138" y2="100"/>
    <line x1="100" y1="100" x2="130" y2="68"/>
    <line x1="100" y1="100" x2="70"  y2="132"/>
    <!-- Cross connections -->
    <line x1="100" y1="58"  x2="130" y2="68"/>
    <line x1="100" y1="58"  x2="62"  y2="100"/>
    <line x1="138" y1="100" x2="130" y2="68"/>
    <line x1="62"  y1="100" x2="70"  y2="132"/>
    <line x1="100" y1="142" x2="70"  y2="132"/>
  </g>

  <!-- ── Pulse ring animation ── -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#58a6ff" stroke-width="2" stroke-opacity="0">
    <animate attributeName="r"            from="72" to="92"  dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" from="0.5" to="0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
